<!-- FILE: booking.html (booking page with name and surname) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMS | Book Your Class</title>
  
</head>
<body>
<header>
  <div class="header-flex">
    <div class="logo-area">
      <img class="logo-image" src="tmsgymlogo-darkbackground.png" alt="TMS Logo">
      <div class="brand">
        <h1>TOTAL MUSCLE SANCTUARY</h1>
      </div>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="membership.html">MEMBERSHIP</a></li>
        <li><a href="tutors.html">PRIVATE TUTORS</a></li>
        <li><a href="classes.html">CLASSES</a></li>
        <li><a href="food.html">MENU</a></li>
        <li><a href="history.html">HISTORY</a></li>
        <li><a href="reviews.html">REVIEWS</a></li>
      </ul>
    </nav>
  </div>
</header>
<link rel="stylesheet" href="style.css">
<main class="container">
  <div class="booking-card">
    <h2 style="color: var(--primary-red); margin-bottom: 0.5rem;">BOOK YOUR CLASS</h2>
    <p>Fill in your details to reserve a spot.</p>

    <div class="class-details" id="classDetails">
      <!-- Class info will be injected here from URL parameters -->
      <p>Loading class information...</p>
    </div>

    <form id="bookingForm">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" id="firstName" required placeholder="e.g., John">
      </div>
      <div class="form-group">
        <label>Surname *</label>
        <input type="text" id="surname" required placeholder="e.g., Doe">
      </div>
      <div class="form-group">
        <label>Email Address (optional)</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <button type="submit" class="btn-submit">CONFIRM BOOKING</button>
      <a href="classes.html" class="btn-back" style="display: block; text-align: center;">← Back to Timetable</a>
    </form>
  </div>
</main>

<footer>
  <p>TMS – Total Muscle Sanctuary | Book your class now</p>
</footer>

<script>
  // Get URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const className = urlParams.get('class') || 'Not specified';
  const day = urlParams.get('day') || 'Unknown day';
  const time = urlParams.get('time') || 'Unknown time';

  // Display class details
  const detailsDiv = document.getElementById('classDetails');
  detailsDiv.innerHTML = `
    <p><strong>📅 Class:</strong> ${decodeURIComponent(className)}</p>
    <p><strong>📆 Day:</strong> ${decodeURIComponent(day)}</p>
    <p><strong>⏰ Time:</strong> ${decodeURIComponent(time)}</p>
    <p style="margin-top: 0.5rem; font-size: 0.85rem; color: #ffc285;">Membership required for entry. Please arrive 10 minutes early.</p>
  `;

  // Handle form submission
  document.getElementById('bookingForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const firstName = document.getElementById('firstName').value.trim();
    const surname = document.getElementById('surname').value.trim();
    const email = document.getElementById('email').value.trim();

    if (!firstName || !surname) {
      alert('Please enter both first name and surname.');
      return;
    }

    // Simulate booking confirmation
    const fullName = firstName + ' ' + surname;
    alert(`✅ Booking confirmed for ${fullName}!\n\nClass: ${decodeURIComponent(className)}\nDay: ${decodeURIComponent(day)}\nTime: ${decodeURIComponent(time)}\n\nA confirmation has been sent to ${email || 'your provided email (if any)'}. See you at TMS!`);

    // Optional: redirect back to classes page after a short delay
    window.location.href = 'classes.html';
  });
</script>
</body>
</html>
